services:
  - type: web
    name: kwetu-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: kwetu-db
          property: connectionString
      - key: AUTH_TOKEN_SECRET
        generateValue: true
      - key: ADMIN_NAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: IMGBB_API_KEY
        sync: false
      - key: DARAJA_ENV
        sync: false
      - key: DARAJA_CONSUMER_KEY
        sync: false
      - key: DARAJA_CONSUMER_SECRET
        sync: false
      - key: DARAJA_SHORTCODE
        sync: false
      - key: DARAJA_PASSKEY
        sync: false
      - key: DARAJA_CALLBACK_BASE_URL
        sync: false
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: kwetu-frontend
          property: url

  - type: web
    name: kwetu-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: kwetu-api
          property: url

databases:
  - name: kwetu-db
    plan: free
